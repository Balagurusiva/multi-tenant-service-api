paths:
  /users:
    get:
      summary: Get technicians for the tenant
      description: Retrieve a paginated list of tenant users. To fetch technicians, set `role=TECHNICIAN`. This endpoint is intended for ADMIN users and also supports `CUSTOMER` as a role filter.
      tags:
        - Technicians
      parameters:
        - name: role
          in: query
          required: true
          description: Role filter. Use `TECHNICIAN` to list technician accounts.
          schema:
            type: string
            enum:
              - TECHNICIAN
              - CUSTOMER
            example: TECHNICIAN
        - name: page
          in: query
          required: false
          description: Page number starting from 1.
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Number of records to return per page.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
            example: 10
        - name: search
          in: query
          required: false
          description: Search by technician name or email.
          schema:
            type: string
            default: ""
            example: "arun"
        - name: sortBy
          in: query
          required: false
          description: Field used for sorting the result set.
          schema:
            type: string
            enum:
              - user_id
              - user_name
              - email
            default: user_id
            example: user_name
        - name: orderBy
          in: query
          required: false
          description: Sort direction for the selected field.
          schema:
            type: string
            enum:
              - asc
              - desc
              - '1'
              - '-1'
            default: asc
            example: asc
      responses:
        '200':
          description: Technician list returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "List of Technician"
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: integer
                              example: 101
                            user_name:
                              type: string
                              example: "Arun Kumar"
                            email:
                              type: string
                              format: email
                              example: "arun.kumar@example.com"
                            address:
                              type: string
                              example: "45 Lake View Street, Chennai, Tamil Nadu 600001"
                            contact_no:
                              type: string
                              example: "9876543210"
                      metaData:
                        type: object
                        properties:
                          totalRecords:
                            type: integer
                            example: 25
                          currentPage:
                            type: integer
                            example: 1
                          itemsPerPage:
                            type: integer
                            example: 10
                          totalPages:
                            type: integer
                            example: 3
                          hasNextPage:
                            type: boolean
                            example: true
                          hasPrevPage:
                            type: boolean
                            example: false
        '400':
          description: Validation failed for one or more query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Validation failed"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: "query.role"
                        message:
                          type: string
                          example: "Invalid option: expected one of \"TECHNICIAN\"|\"CUSTOMER\""
        '401':
          description: Unauthorized - missing, invalid, or expired access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You are not logged in. Please login to continue"
        '403':
          description: Forbidden - only ADMIN users can list technicians
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You do not have permission to perform this action"

  /technician:
    post:
      summary: Create a new technician
      description: Create a technician account under the authenticated tenant. Only ADMIN users can create technicians.
      tags:
        - Technicians
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_name
                - email
                - password
                - contact_no
                - address
              properties:
                user_name:
                  type: string
                  minLength: 4
                  description: Full name of the technician.
                  example: "Arun Kumar"
                email:
                  type: string
                  format: email
                  description: Unique email address used for technician login.
                  example: "arun.kumar@example.com"
                password:
                  type: string
                  minLength: 8
                  maxLength: 50
                  description: Password for the technician account.
                  example: "StrongPass123"
                contact_no:
                  type: string
                  minLength: 10
                  description: Primary contact number for the technician.
                  example: "9876543210"
                address:
                  type: string
                  minLength: 20
                  maxLength: 100
                  description: Residential or service address of the technician.
                  example: "45 Lake View Street, Chennai, Tamil Nadu 600001"
      responses:
        '200':
          description: Technician created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Technician Created Successfully"
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 101
                      name:
                        type: string
                        example: "Arun Kumar"
                      role:
                        type: string
                        example: "TECHNICIAN"
                      email:
                        type: string
                        format: email
                        example: "arun.kumar@example.com"
                      address:
                        type: string
                        example: "45 Lake View Street, Chennai, Tamil Nadu 600001"
                      contact_no:
                        type: string
                        example: "9876543210"
        '400':
          description: Validation failed for the request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Validation failed"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                          example: "body.address"
                        message:
                          type: string
                          example: "Address should contain atleast 20 character"
        '401':
          description: Unauthorized - missing, invalid, or expired access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You are not logged in. Please login to continue"
        '403':
          description: Forbidden - only ADMIN users can create technicians
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You do not have permission to perform this action"
        '409':
          description: Conflict - a technician with the provided email already exists in the tenant
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Technician already exists with provided email"

  /technician/{user_id}:
    get:
      summary: Get technician details by user ID
      description: Retrieve a technician profile by `user_id`. ADMIN users can access any technician in their tenant, while TECHNICIAN users can access only their own profile.
      tags:
        - Technicians
      parameters:
        - name: user_id
          in: path
          required: true
          description: Numeric identifier of the technician.
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Technician details returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Technician Details"
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 101
                      name:
                        type: string
                        example: "Arun Kumar"
                      role:
                        type: string
                        example: "TECHNICIAN"
                      email:
                        type: string
                        format: email
                        example: "arun.kumar@example.com"
                      address:
                        type: string
                        example: "45 Lake View Street, Chennai, Tamil Nadu 600001"
                      contact_no:
                        type: string
                        example: "9876543210"
        '400':
          description: Invalid user ID format
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Invalid User Id Format"
        '401':
          description: Unauthorized - missing, invalid, or expired access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You are not logged in. Please login to continue"
        '403':
          description: Forbidden - technician users can only access their own profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Access Denied"
        '404':
          description: Technician not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Technician not found"

    patch:
      summary: Update technician details
      description: Update one or more technician fields by `user_id`. ADMIN users can update any technician in their tenant, while TECHNICIAN users can update only their own profile.
      tags:
        - Technicians
      parameters:
        - name: user_id
          in: path
          required: true
          description: Numeric identifier of the technician to update.
          schema:
            type: string
            example: "101"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_name:
                  type: string
                  minLength: 4
                  description: Updated technician name.
                  example: "Arun Prakash"
                email:
                  type: string
                  format: email
                  description: Updated email address.
                  example: "arun.prakash@example.com"
                password:
                  type: string
                  minLength: 8
                  maxLength: 50
                  description: Updated account password.
                  example: "NewStrongPass123"
                contact_no:
                  type: string
                  minLength: 10
                  description: Updated contact number.
                  example: "9876501234"
                address:
                  type: string
                  minLength: 20
                  maxLength: 100
                  description: Updated technician address.
                  example: "12 Sunrise Avenue, Coimbatore, Tamil Nadu 641001"
      responses:
        '200':
          description: Technician updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Technician Updated Successfully"
                  data:
                    type: object
                    properties:
                      user_id:
                        type: integer
                        example: 101
                      name:
                        type: string
                        example: "Arun Prakash"
                      role:
                        type: string
                        example: "TECHNICIAN"
                      email:
                        type: string
                        format: email
                        example: "arun.prakash@example.com"
                      address:
                        type: string
                        example: "12 Sunrise Avenue, Coimbatore, Tamil Nadu 641001"
                      contact_no:
                        type: string
                        example: "9876501234"
        '400':
          description: Validation failed or user ID format is invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    oneOf:
                      - type: string
                        example: "Validation failed"
                      - type: string
                        example: "Invalid User Id Format"
        '401':
          description: Unauthorized - missing, invalid, or expired access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You are not logged in. Please login to continue"
        '403':
          description: Forbidden - access denied or the selected user is not a technician
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    oneOf:
                      - type: string
                        example: "Access Denied"
                      - type: string
                        example: "Target user is not a technician"
        '404':
          description: Technician not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Technician not found"

    delete:
      summary: Delete a technician
      description: Delete a technician account by `user_id` for the authenticated tenant. Only ADMIN users can delete technicians.
      tags:
        - Technicians
      parameters:
        - name: user_id
          in: path
          required: true
          description: Numeric identifier of the technician to delete.
          schema:
            type: string
            example: "101"
      responses:
        '200':
          description: Technician deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Technician Deleted Successfully"
        '401':
          description: Unauthorized - missing, invalid, or expired access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You are not logged in. Please login to continue"
        '403':
          description: Forbidden - only ADMIN users can delete technicians
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You do not have permission to perform this action"
        '404':
          description: Technician not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Technician Not Found"
