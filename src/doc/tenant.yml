paths:
  /tenant-register:
    post:
      summary: Register a new tenant organization
      description: Creates a new tenant organization along with an admin user account
      tags:
        - Tenants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - OrgName
                - orgSlug
                - adminName
                - adminEmail
                - adminPassword
                - adminContactNo
                - adminAddress
              properties:
                OrgName:
                  type: string
                  minLength: 2
                  maxLength: 50
                  description: Name of the organization
                  example: "Acme Corporation"
                orgSlug:
                  type: string
                  minLength: 2
                  maxLength: 50
                  pattern: '^[a-z0-9-]+$'
                  description: Unique slug for the organization (lowercase letters, numbers, and hyphens only)
                  example: "acme-corp"
                adminName:
                  type: string
                  minLength: 2
                  maxLength: 50
                  description: Name of the admin user
                  example: "John Doe"
                adminEmail:
                  type: string
                  format: email
                  description: Email address of the admin user
                  example: "john.doe@acme.com"
                adminPassword:
                  type: string
                  minLength: 8
                  maxLength: 50
                  description: Password for the admin user account
                  example: "SecurePass123"
                adminContactNo:
                  type: string
                  pattern: '^[6-9]\d{9}$'
                  description: 10-digit Indian mobile number
                  example: "9876543210"
                adminAddress:
                  type: string
                  minLength: 10
                  maxLength: 255
                  description: Address of the admin user
                  example: "123 Business Street, Tech City, State 123456"
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Organization created successfully"
                  data:
                    type: object
                    properties:
                      tenantId:
                        type: string
                        description: Unique identifier for the tenant
                        example: "1"
                      userId:
                        type: string
                        description: Unique identifier for the admin user
                        example: "101"
        '400':
          description: Bad request - validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Validation failed"
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        message:
                          type: string
        '409':
          description: Conflict - organization slug or admin email already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    oneOf:
                      - example: "An Organization with this slug already exists."
                      - example: "An admin account with this email already exists."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Internal server error"
