paths:
  /services:
    get:
      summary: Get all services for tenant
      description: Retrieve a list of services for the authenticated tenant.
      tags:
        - Services
      responses:
        '200':
          description: List of services returned successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ""
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        service_id:
                          type: string
                          example: "T101_1"
                        service_name:
                          type: string
                          example: "Cleaning"
                        service_description:
                          type: string
                          example: "Home deep cleaning service"
                        est_duration_min:
                          type: integer
                          example: 120
                        cost:
                          type: number
                          example: 4500
                        is_active:
                          type: string
                          example: "ACTIVE"
        '401':
          description: Unauthorized - missing or invalid token
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Unauthorized"

  /services/create_service:
    post:
      summary: Create a new service
      description: Creates a new service record for the tenant. Requires ADMIN role.
      tags:
        - Services
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_name
                - est_duration_min
                - cost
              properties:
                service_name:
                  type: string
                  minLength: 4
                  description: Name of the service
                  example: "Premium House Cleaning"
                service_description:
                  type: string
                  description: Optional description of the service
                  example: "Complete 4-room deep cleaning"
                est_duration_min:
                  type: integer
                  description: Estimated duration in minutes
                  example: 180
                cost:
                  type: number
                  description: Service cost in currency units
                  example: 3500
      responses:
        '200':
          description: Service created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service Created Successfully"
                  data:
                    type: object
                    properties:
                      service_id:
                        type: string
                        example: "T101_1"
                      service_name:
                        type: string
                        example: "Premium House Cleaning"
                      service_description:
                        type: string
                        example: "Complete 4-room deep cleaning"
                      est_duration_min:
                        type: integer
                        example: 180
                      cost:
                        type: number
                        example: 3500
                      is_active:
                        type: string
                        example: "ACTIVE"
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Validation failed"

  /services/update_service/{service_id}:
    patch:
      summary: Update an existing service
      description: Update one or more service fields by service_id. Requires ADMIN role.
      tags:
        - Services
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
          description: Service identifier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                service_name:
                  type: string
                  description: Updated name
                  example: "Premium Office Cleaning"
                service_description:
                  type: string
                  example: "Updated description"
                est_duration_min:
                  type: integer
                  example: 210
                cost:
                  type: number
                  example: 4200
      responses:
        '200':
          description: Service updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service Updated Successfully"
                  data:
                    type: object
                    properties:
                      service_id:
                        type: string
                        example: "T101_1"
                      service_name:
                        type: string
                        example: "Premium Office Cleaning"
                      service_description:
                        type: string
                        example: "Updated description"
                      est_duration_min:
                        type: integer
                        example: 210
                      cost:
                        type: number
                        example: 4200
                      is_active:
                        type: string
                        example: "ACTIVE"
        '400':
          description: Validation error or bad request
        '404':
          description: Service not found

  /services/{service_id}:
    get:
      summary: Get a service by ID
      description: Retrieve details for a specific service by service_id.
      tags:
        - Services
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ""
                  data:
                    type: object
                    properties:
                      service_id:
                        type: string
                        example: "T101_1"
                      service_name:
                        type: string
                        example: "Premium House Cleaning"
                      service_description:
                        type: string
                        example: "Complete 4-room deep cleaning"
                      est_duration_min:
                        type: integer
                        example: 180
                      cost:
                        type: number
                        example: 3500
                      is_active:
                        type: string
                        example: "ACTIVE"
        '404':
          description: Service not found
    delete:
      summary: Delete a service
      description: Delete a service by service_id. Requires ADMIN role.
      tags:
        - Services
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Service deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service Deleted Successfully"
        '404':
          description: Service not found
